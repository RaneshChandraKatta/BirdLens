<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In • Sign Up</title>
  
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
        crossorigin="anonymous">
  
  <style>
    body {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #e0e0ff;
    }

    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .auth-card {
      background: rgba(25, 25, 45, 0.78);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(120, 120, 255, 0.14);
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .nav-tabs .nav-link {
      color: #a0a0ff;
      border: none;
      border-radius: 0;
      padding: 1rem 2rem;
      font-weight: 500;
      position: relative;
    }

    .nav-tabs .nav-link.active {
      color: white;
      background: transparent;
    }

    .nav-tabs .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40%;
      height: 3px;
      background: #6366f1;
      border-radius: 3px;
    }

    .form-control, .form-control:focus {
      background: rgba(40, 40, 70, 0.6);
      border: 1px solid rgba(100, 100, 255, 0.3);
      color: white;
      border-radius: 10px;
      padding: 0.75rem 1.1rem;
    }

    .form-control:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25);
      background: rgba(40, 40, 70, 0.85);
    }

    .btn-primary {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 10px;
      padding: 0.75rem;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
    }

    .text-muted {
      color: #b0b0ff !important;
    }

    .small-link {
      color: #a5b4fc;
      text-decoration: none;
      font-size: 0.92rem;
    }

    .small-link:hover {
      color: #c7d2fe;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="auth-container">
  
  <div class="auth-card">
    
    <!-- Flash Messages Block -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="px-4 pt-3">
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <ul class="nav nav-tabs justify-content-center border-0" id="authTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link {% if active_tab == 'login' %}active{% endif %}" id="signin-tab" data-bs-toggle="tab" 
                data-bs-target="#signin" type="button" role="tab" aria-selected="{% if active_tab == 'login' %}true{% else %}false{% endif %}">
          Sign In
        </button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link {% if active_tab == 'register' %}active{% endif %}" id="signup-tab" data-bs-toggle="tab" 
                data-bs-target="#signup" type="button" role="tab" aria-selected="{% if active_tab == 'register' %}true{% else %}false{% endif %}">
          Sign Up
        </button>
      </li>
    </ul>

    <div class="tab-content p-4 p-md-5">

      <!-- SIGN IN -->
      <div class="tab-pane fade {% if active_tab == 'login' %}show active{% endif %}" id="signin" role="tabpanel">
        <h3 class="text-center mb-4 fw-light">Welcome back</h3>

        <form action="{{ url_for('login') }}" method="POST">
          <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Email address or Username" required>
          </div>
          
          <div class="mb-4">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-3">
            Sign In
          </button>

          <p class="text-center text-muted small mt-3">
            Don't have an account? 
            <a href="#" class="small-link" data-bs-toggle="tab" data-bs-target="#signup" onclick="document.getElementById('signup-tab').click(); return false;">Sign up</a>
          </p>
        </form>
      </div>

      <!-- SIGN UP -->
      <div class="tab-pane fade {% if active_tab == 'register' %}show active{% endif %}" id="signup" role="tabpanel">
        <h3 class="text-center mb-4 fw-light">Create account</h3>

        <form action="{{ url_for('register') }}" method="POST">
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Full name (optional)">
          </div>
          
          <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Email address or Username" required>
          </div>

          <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Create password" required minlength="6">
          </div>

          <div class="mb-4">
            <input type="password" class="form-control" placeholder="Confirm password" required minlength="6">
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-3">
            Create Account
          </button>

          <p class="text-center text-muted small mt-3">
            Already have an account? 
            <a href="#" class="small-link" data-bs-toggle="tab" data-bs-target="#signin" onclick="document.getElementById('signin-tab').click(); return false;">Sign in</a>
          </p>
        </form>
      </div>

    </div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
        crossorigin="anonymous"></script>

</body>
</html>
