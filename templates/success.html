{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm text-center">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Prediction Result</h4>
            </div>
            <div class="card-body">
                <h2 class="display-6 mt-3 text-primary">{{ pred }}</h2>
                <div class="mt-4 mb-4">
                    <img src="{{ url_for('static', filename=full_filename) }}" alt="Uploaded Image" class="img-fluid rounded shadow" style="max-height: 400px; object-fit: contain;">
                </div>
                <div class="mt-4">
                    <a href="{{ url_for('index') }}" class="btn btn-outline-primary btn-lg px-5">Test Another Image</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
