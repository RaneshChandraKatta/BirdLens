<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BirdLens – Home</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
        crossorigin="anonymous">

  <style>
    body {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      color: #e0e0ff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    .navbar {
      background: rgba(20, 20, 40, 0.82);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(120, 120, 255, 0.12);
      padding: 1rem 2rem;
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 1.5rem;
      background: linear-gradient(90deg, #a5b4fc, #c7d2fe);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-outline-indigo {
      border-color: #818cf8;
      color: #a5b4fc;
    }

    .btn-outline-indigo:hover {
      background: #6366f1;
      color: white;
      border-color: #6366f1;
    }

    .btn-indigo {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border: none;
      color: white;
      font-weight: 600;
    }

    .btn-indigo:hover {
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
    }

    .btn-logout {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
      font-weight: 500;
    }

    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.35);
      color: white;
      border-color: #f87171;
    }

    .hero-section {
      min-height: 90vh;
      display: flex;
      align-items: center;
      padding: 6rem 0 4rem;
    }

    .bird-card {
      background: rgba(25, 25, 45, 0.78);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(120, 120, 255, 0.16);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 70px rgba(0,0,0,0.55);
    }

    .bird-img-placeholder {
      height: 360px;
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3ff;
      font-size: 1.4rem;
      font-weight: 500;
      text-align: center;
      padding: 2rem;
    }

    .species-title {
      font-size: 2.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #c7d2fe, #e0e7ff);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.75rem;
    }

    .sci-name {
      color: #a5b4fc;
      font-style: italic;
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .info-text {
      line-height: 1.75;
      color: #d1d5ff;
    }

    .badge-soft {
      background: rgba(99, 102, 241, 0.18);
      color: #c7d2fe;
      border: 1px solid rgba(99, 102, 241, 0.3);
    }

    .upload-area {
      border: 2px dashed rgba(99, 102, 241, 0.4);
      border-radius: 16px;
      padding: 3.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      background: rgba(30, 30, 60, 0.3);
    }

    .upload-area:hover {
      border-color: #818cf8;
      background: rgba(30, 30, 60, 0.5);
    }

    .upload-area.dragover {
      border-color: #6366f1;
      background: rgba(99, 102, 241, 0.12);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
    }

    footer {
      color: #94a3ff;
      padding: 2rem 0;
      font-size: 0.95rem;
      text-align: center;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">BirdLens</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
            data-bs-target="#navbarContent" aria-controls="navbarContent" 
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
      <ul class="navbar-nav align-items-center gap-4">
        <li class="nav-item">
          <button class="btn btn-outline-indigo px-4 py-2" id="browseBtn">
            Browse
          </button>
        </li>
        <li class="nav-item">
          <button class="btn btn-indigo px-5 py-2" id="predictBtn">
            Predict
          </button>
        </li>
        <li class="nav-item">
          <button class="btn btn-logout px-4" id="logoutBtn">
            Logout
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main Content -->
<section class="hero-section">
  <div class="container">

    <div class="row justify-content-center">
      <div class="col-xl-10 col-lg-11">

        <div class="bird-card mb-5">
          <!-- Image / Upload Area -->
          <div class="bird-img-placeholder" id="imagePreviewArea">
            <div class="upload-area w-100 h-100 d-flex flex-column align-items-center justify-content-center"
                 id="uploadArea">
              <div class="mb-4">
                <i class="bi bi-cloud-arrow-up fs-1" style="font-size:4rem; opacity:0.65;"></i>
              </div>
              <h4 class="mb-3">Drop your bird photo here</h4>
              <p class="text-muted mb-2">or click "Browse" to select from device</p>
              <p class="small text-muted">JPG / PNG • Max 10MB recommended</p>
            </div>
            <img src="" class="w-100 h-100 d-none" style="object-fit: contain; padding: 1rem;" id="previewImg" alt="Selected bird photo">
          </div>

          <!-- Species Info (hidden until prediction result) -->
          <div class="p-4 p-md-5 d-none" id="resultSection">
            <div class="sci-name fs-4 mb-1"></div>
            <h1 class="species-title">Prediction Result</h1>

            <div class="d-flex gap-3 flex-wrap mb-4" id="badgesContainer">
              <!-- Badges will be added dynamically -->
            </div>

            <p class="info-text lead" id="descriptionLead"></p>

            <p class="info-text" id="descriptionDetail"></p>

            <div class="mt-4 pt-4 border-top border-secondary border-opacity-25">
               <button class="btn btn-outline-indigo px-4 py-2" id="checkAnotherBtn">
                 <i class="bi bi-arrow-counterclockwise me-2"></i>Check Another Image
               </button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</section>

<footer>
  © 2026 BirdLens
</footer>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" 
        crossorigin="anonymous"></script>

<script>
// ────────────────────────────────────────────────
const uploadArea     = document.getElementById('uploadArea');
const imagePreviewArea = document.getElementById('imagePreviewArea');
const resultSection  = document.getElementById('resultSection');
const browseBtn      = document.getElementById('browseBtn');
const predictBtn     = document.getElementById('predictBtn');
const previewImg     = document.getElementById('previewImg');
const checkAnotherBtn = document.getElementById('checkAnotherBtn');

let fileInput = null;
let currentFile = null;

const birdDescriptions = {
  "AMERICAN GOLDFINCH": "The American goldfinch (Spinus tristis) is a small North American bird in the finch family. It is migratory, ranging from mid-Alberta to North Carolina during the breeding season, and from just south of the Canada–United States border to Mexico during the winter.",
  "BARN OWL": "The barn owls, owls in the genus Tyto, are the most widely distributed genus of owls in the world. They are medium-sized owls with large heads and characteristic heart-shaped faces. They have long, strong legs with powerful talons.",
  "CARMINE BEE-EATER": "The southern carmine bee-eater (Merops nubicoides) is a species of bee-eater found across sub-equatorial Africa. It was formerly considered conspecific with the closely related northern carmine bee-eater, with the combined species then known as carmine bee-eater.",
  "DOWNY WOODPECKER": "The downy woodpecker (Dryobates pubescens) is a species of woodpecker, the smallest in North America. Length ranges from 14 to 18 cm (5.5 to 7.1 in). Downy woodpeckers primarily live in forested areas throughout the United States and Canada, with the exception of deserts in the southwest and the northern tundra. The bird nests in tree cavities and feeds primarily on insects, although it supplements its diet with seeds and berries. The downy woodpecker is very similar in appearance to the hairy woodpecker, although they are not closely related.",
  "EMPEROR PENGUIN": "The emperor penguin (Aptenodytes forsteri) is the tallest and heaviest of all living penguin species and is endemic to Antarctica.",
  "FLAMINGO": "Flamingos or flamingoes (/fləˈmɪŋɡoʊz/) are a type of wading bird in the family Phoenicopteridae, which is the only extant family in the order Phoenicopteriformes. There are four flamingo species distributed throughout the Americas (including the Caribbean), and two species native to Afro-Eurasia."
};

// Create hidden file input
function createFileInput() {
  if (fileInput) fileInput.remove();
  fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/jpeg,image/png,image/jpg';
  fileInput.style.display = 'none';
  document.body.appendChild(fileInput);
  fileInput.addEventListener('change', handleFileSelect);
}

function handleFileSelect(e) {
  const file = e.target?.files?.[0];
  if (!file) return;

  currentFile = file;

  const reader = new FileReader();
  reader.onload = function(ev) {
    uploadArea.classList.add('d-none');
    previewImg.src = ev.target.result;
    previewImg.classList.remove('d-none');
    resultSection.classList.add('d-none');
  };
  reader.readAsDataURL(file);
}

// ─── Browse button ───────────────────────────────────────
browseBtn.addEventListener('click', () => {
  createFileInput();
  fileInput.click();
});

// ─── Predict button with Backend Fetch ──────────────────
predictBtn.addEventListener('click', () => {
  if (!currentFile) {
    alert("Please browse and select a photo first.");
    return;
  }

  const formData = new FormData();
  formData.append('image_upload', currentFile);
  
  const originalText = predictBtn.textContent;
  predictBtn.disabled = true;
  predictBtn.textContent = 'Predicting...';

  fetch("{{ url_for('api_predict') }}", {
      method: 'POST',
      body: formData
  })
  .then(response => response.json())
  .then(data => {
      predictBtn.disabled = false;
      predictBtn.textContent = 'Predict';
      
      if(data.error) {
          alert('Error: ' + data.error);
          return;
      }
      
      resultSection.classList.remove('d-none');
      resultSection.querySelector('.sci-name').textContent = "The species of the bird is";
      resultSection.querySelector('.species-title').textContent = data.prediction;

      document.getElementById('badgesContainer').innerHTML = ``;

      document.getElementById('descriptionLead').textContent = "";
      document.getElementById('descriptionDetail').textContent = birdDescriptions[data.prediction] || "Description not available.";
  })
  .catch(error => {
      predictBtn.disabled = false;
      predictBtn.textContent = 'Predict';
      alert('Network error occurred during prediction.');
  });
});

checkAnotherBtn.addEventListener('click', () => {
    currentFile = null;
    if (fileInput) fileInput.value = "";
    resultSection.classList.add('d-none');
    previewImg.classList.add('d-none');
    previewImg.src = "";
    uploadArea.classList.remove('d-none');
});

// ─── Drag & Drop ─────────────────────────────────────────
['dragover', 'dragenter'].forEach(evt => {
  uploadArea?.addEventListener(evt, e => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
});

['dragleave', 'drop'].forEach(evt => {
  uploadArea?.addEventListener(evt, e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
  });
});

uploadArea?.addEventListener('drop', e => {
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    currentFile = file;
    const fakeEvent = { target: { files: [file] } };
    handleFileSelect(fakeEvent);
  }
});

uploadArea?.addEventListener('click', () => {
  createFileInput();
  fileInput.click();
});

// Logout
document.getElementById('logoutBtn').addEventListener('click', () => {
  if (confirm("Log out?")) {
    window.location.href = "{{ url_for('logout') }}";
  }
});
</script>
</body>
</html>
